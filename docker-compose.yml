version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: safety_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: safety_ai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: safety_backend
    restart: always
    depends_on:
      - postgres
    environment:
      APP_NAME: AI Safety Intelligence Platform
      APP_VERSION: 1.0.0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/safety_ai_db
      SECRET_KEY: your_secret_key_here
      GROQ_API_KEY: your_groq_api_key_here
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models

  frontend:
    build:
      context: ./frontend
    container_name: safety_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data: